spring.application.name=bjtubook

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/secondhand_book?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=org.example.bjtubook.entity
mybatis-plus.global-config.db-config.id-type=auto

# 服务器配置
server.port=8080
server.servlet.context-path=

# 开发工具配置
spring.devtools.restart.enabled=true
